# === Ported from Ghostty ===
font_size 15
copy_on_select clipboard
strip_trailing_spaces smart

# Theme — auto dark/light switching uses .auto.conf files (see below)

# === macOS ===
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_titlebar_color background

# === Cursor ===
cursor_blink_interval 0

# === Tab bar ===
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# === Window ===
window_padding_width 4
confirm_os_window_close 0
inactive_text_alpha 0.3

# === Scrollback ===
scrollback_lines 10000

# === Performance ===
repaint_delay 6
input_delay 1

# === Shell integration ===
shell_integration enabled

# === Remote control ===
allow_remote_control yes

# === Kitten diff ===
# Use: kitten diff file1 file2
# Or as git difftool (see diff.conf for colors)

# === Layout ===
enabled_layouts splits,stack

# === Session ===
# Save session before quitting, restore on startup
startup_session ~/.config/kitty/last-session.conf

# === Keyboard shortcuts ===
# Diff current git changes
map cmd+d launch --type=overlay kitten diff HEAD

# New tab inherits CWD
map cmd+t launch --cwd=current --type=tab

# Splits (matches tmux: | horizontal, - vertical)
map ctrl+t>| launch --location=vsplit --cwd=current
map ctrl+t>- launch --location=hsplit --cwd=current

# Pane navigation (matches tmux: h/j/k/l)
map ctrl+t>h neighboring_window left
map ctrl+t>j neighboring_window down
map ctrl+t>k neighboring_window up
map ctrl+t>l neighboring_window right

# Pane resize (matches tmux: H/J/K/L)
map ctrl+t>shift+h resize_window narrower 5
map ctrl+t>shift+j resize_window shorter 5
map ctrl+t>shift+k resize_window taller 5
map ctrl+t>shift+l resize_window wider 5

# Swap splits (move window forward/backward in layout)
map ctrl+t>x swap_with_window

# Equalize split layout (reset to equal sizes)
map ctrl+t>= resize_window reset

# Quick-jump to visible split (visual overlay picker)
map ctrl+t>w focus_visible_window

# Zoom current pane (like tmux ctrl+b z)
map ctrl+t>z toggle_layout stack

# Jump to tab by number (cmd+1 through cmd+9)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Move current tab left/right
map ctrl+shift+h move_tab_backward
map ctrl+shift+l move_tab_forward

# Close split (not OS window)
map cmd+w close_window

# Quick terminal (global hotkey, opens in dot-ai-config)
global_shortcut ctrl+` toggle_quick_terminal
quick_terminal_dir ~/projects/dot-ai-config

# Reload config
map ctrl+t>r load_config_file
