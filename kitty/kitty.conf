# === Ported from Ghostty ===
font_size 15
copy_on_select clipboard
strip_trailing_spaces smart

# Theme — auto dark/light switching uses .auto.conf files (see below)

# === macOS ===
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_titlebar_color background

# === Cursor ===
cursor_blink_interval 0

# === Tab bar ===
tab_bar_style powerline
tab_powerline_style slanted

# === Window ===
window_padding_width 4
confirm_os_window_close 0

# === Scrollback ===
scrollback_lines 10000

# === Performance ===
repaint_delay 6
input_delay 1

# === Shell integration ===
shell_integration enabled

# === Kitten diff ===
# Use: kitten diff file1 file2
# Or as git difftool (see diff.conf for colors)

# === Layout ===
enabled_layouts splits,stack

# === Keyboard shortcuts ===
# Diff current git changes
map cmd+d launch --type=overlay kitten diff HEAD

# Splits (matches tmux: | horizontal, - vertical)
map ctrl+t>| launch --location=vsplit --cwd=current
map ctrl+t>- launch --location=hsplit --cwd=current

# Pane navigation (matches tmux: h/j/k/l)
map ctrl+t>h neighboring_window left
map ctrl+t>j neighboring_window down
map ctrl+t>k neighboring_window up
map ctrl+t>l neighboring_window right

# Pane resize (matches tmux: H/J/K/L)
map ctrl+t>shift+h resize_window narrower 5
map ctrl+t>shift+j resize_window shorter 5
map ctrl+t>shift+k resize_window taller 5
map ctrl+t>shift+l resize_window wider 5
