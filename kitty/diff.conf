# Catppuccin Frappe colors for kitten diff
pygments_style catppuccin-frappe

# Diff colors (Catppuccin Frappe palette)
foreground           #c6d0f5
background           #303446
title_fg             #c6d0f5
title_bg             #292c3c
margin_fg            #838ba7
margin_bg            #292c3c
removed_bg           #432c39
highlight_removed_bg #5e3546
removed_margin_bg    #432c39
added_bg             #2b3940
highlight_added_bg   #3b5249
added_margin_bg      #2b3940
filler_bg            #292c3c
hunk_margin_bg       #393c54
hunk_bg              #393c54
search_bg            #e5c890
search_fg            #303446
select_bg            #626880
select_fg            #c6d0f5

# Context lines
num_context_lines 3

# Syntax highlighting
syntax_aliases pyj:py pyi:py recipe:py

# Diff mode
diff_cmd auto
